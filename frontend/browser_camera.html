<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heartbeat AI — Browser camera → API</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --ok: #3dd68c;
      --risk: #ff6b6b;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      padding: 1.5rem;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    a { color: var(--accent); }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    input[type="text"], input[type="password"], input[type="number"] {
      width: min(100%, 28rem);
      padding: 0.5rem 0.65rem;
      border: 1px solid #2d3a4d;
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-size: 0.9rem;
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem 1rem; align-items: flex-end; margin-bottom: 1rem; }
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.secondary { background: #2d3a4d; color: var(--text); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    video {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #2d3a4d;
      background: #000;
    }
    pre {
      background: var(--card);
      border: 1px solid #2d3a4d;
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      font-size: 0.78rem;
      max-height: 14rem;
    }
    .stat { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
    .stat strong { color: var(--text); }
    .risk { color: var(--risk); font-weight: 600; }
  </style>
</head>
<body>
  <h1>Browser camera → Heartbeat API</h1>
  <p class="sub">
    Uses <code>getUserMedia</code>, captures JPEG frames, and <code>POST</code>s multipart <code>file</code> to
    <code>/ingest/frame</code>. Serve this page over <strong>HTTPS</strong> (or localhost) so the camera works.
    <a href="index.html">Status dashboard</a>
  </p>

  <div class="row">
    <div>
      <label for="apiBase">API base URL (no trailing slash)</label>
      <input type="text" id="apiBase" placeholder="https://your-service.onrender.com" autocomplete="url" />
    </div>
  </div>
  <div class="row">
    <div>
      <label for="ingestKey">X-Ingest-Key (optional; if set on server)</label>
      <input type="password" id="ingestKey" placeholder="HEARTBEAT_BROWSER_INGEST_KEY" autocomplete="off" />
    </div>
    <div>
      <label for="intervalMs">Interval (ms)</label>
      <input type="number" id="intervalMs" min="200" max="10000" step="100" value="800" style="width: 8rem;" />
    </div>
  </div>
  <div class="row">
    <button type="button" id="btnStart">Start camera &amp; send</button>
    <button type="button" id="btnStop" class="secondary" disabled>Stop</button>
  </div>

  <video id="vid" playsinline autoplay muted width="640" height="480"></video>
  <canvas id="cv" width="640" height="480" hidden></canvas>

  <p class="stat" id="stat">Frames sent: 0 · last HTTP: —</p>
  <pre id="out">{}</pre>

  <script>
    const LS_API = "heartbeat_api_base";
    const LS_KEY = "heartbeat_ingest_key";
    const apiBase = document.getElementById("apiBase");
    const ingestKey = document.getElementById("ingestKey");
    const intervalMs = document.getElementById("intervalMs");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const vid = document.getElementById("vid");
    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d");
    const out = document.getElementById("out");
    const stat = document.getElementById("stat");

    apiBase.value = localStorage.getItem(LS_API) || "http://127.0.0.1:8000";
    ingestKey.value = localStorage.getItem(LS_KEY) || "";

    let stream = null;
    let timer = null;
    let sent = 0;

    function base() {
      return apiBase.value.replace(/\/+$/, "");
    }

    async function sendFrame() {
      const w = vid.videoWidth;
      const h = vid.videoHeight;
      if (!w || !h) return;
      cv.width = w;
      cv.height = h;
      ctx.drawImage(vid, 0, 0, w, h);
      const blob = await new Promise((resolve) =>
        cv.toBlob(resolve, "image/jpeg", 0.72)
      );
      if (!blob) return;

      const fd = new FormData();
      fd.append("file", blob, "frame.jpg");
      const headers = {};
      const k = ingestKey.value.trim();
      if (k) headers["X-Ingest-Key"] = k;

      const t0 = performance.now();
      const res = await fetch(`${base()}/ingest/frame`, { method: "POST", body: fd, headers });
      const ms = Math.round(performance.now() - t0);
      const text = await res.text();
      let json;
      try {
        json = JSON.parse(text);
      } catch {
        json = { raw: text, status: res.status };
      }
      sent += 1;
      stat.textContent = `Frames sent: ${sent} · last HTTP: ${res.status} (${ms} ms)`;
      out.textContent = JSON.stringify(json, null, 2);
    }

    function loop() {
      sendFrame().catch((e) => {
        out.textContent = JSON.stringify({ error: String(e) }, null, 2);
      });
    }

    btnStart.addEventListener("click", async () => {
      localStorage.setItem(LS_API, apiBase.value.trim());
      localStorage.setItem(LS_KEY, ingestKey.value);
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        vid.srcObject = stream;
        await vid.play();
      } catch (e) {
        out.textContent = JSON.stringify({ error: "getUserMedia failed", detail: String(e) }, null, 2);
        return;
      }
      btnStart.disabled = true;
      btnStop.disabled = false;
      const iv = Math.max(200, Math.min(10000, Number(intervalMs.value) || 800));
      timer = setInterval(loop, iv);
      loop();
    });

    btnStop.addEventListener("click", () => {
      if (timer) clearInterval(timer);
      timer = null;
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      vid.srcObject = null;
      btnStart.disabled = false;
      btnStop.disabled = true;
    });
  </script>
</body>
</html>
